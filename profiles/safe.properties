# Conservative profile: only patches with near-exact behavior and no TTL/visual LOD.
# Copy this file over ../prepatcher.properties, then restart Starsector.
enabled=true
patch.retainAll=true
patch.scratchCollections=true
patch.labelSpatialCandidates=false
patch.intelCallbackCache=false
patch.intelExistingIconLookup=true
patch.intelEntityIndex=false
patch.intelFastContains=true
patch.hoverHitTestCache=false
patch.systemNebulaCache=false
patch.sampleCacheClearThrottle=false
patch.gridLineCap=false
patch.arrowVectorPool=true
patch.campaignListenerThrottle=true
campaign.listenerAuditMs=1000
patch.campaignSnapshotReuse=true
patch.entityScriptSnapshotReuse=true
patch.emptyMemoryAdvanceFastPath=true
patch.routeJumpPointIndex=false
# Exact-behavior local allocation patches remain enabled in the conservative profile.
patch.economyLocationCache=false
patch.economySnapshotReuse=true
patch.commRelaySystemIndex=false
commRelay.indexTtlMs=250
patch.shipAdvanceScratch=true
patch.particleCleanup=true
# KNOWN DISABLED in 0.7.1 after confirmed mission-startup failures; pending isolated fixes.
patch.loadingTextReader=false
patch.startupLogAggregation=false
patch.rulesLiteralParser=true
patch.saveLoadProgressThrottle=false
saveLoad.progressHz=0
patch.saveOutputBufferDedup=true
logging.statsIntervalSeconds=30
