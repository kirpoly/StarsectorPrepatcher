# StarsectorPrepatcher 0.10.0
# Debug profile: aggressive baseline plus observers, CSV/stacks, verbose output and runtime metrics.
# Every patch is matched and verified independently against the loaded bytecode.

enabled=true

# Atomically optimizes H.renderStuff: linear map reconciliation plus reusable
# temporary entity/class collections under one reentrant scratch scope.
patch.mapRenderStuff=true

# Atomically patches the map hit-test method: reusable internal hit list/point
# plus the bounded exact-result hover cache and its preserved vanilla fallback.
patch.mapHitTest=true

# Narrows H.getTextAlignmentFor() to nearby buckets; original exact checks still run.
patch.labelSpatialCandidates=true
label.indexTtlMs=750
label.ownerIdleTtlMs=600000

# Short TTL for IntelInfoPlugin.getMapLocation() in map render/rebuild paths.
patch.intelCallbackCache=true
intel.mapLocationCacheMs=120

# Atomically patches Z.o00000: getArrowData() caching plus the two temporary
# Vector2f objects under one reentrant scratch scope.
patch.intelArrowRendering=true
intel.arrowDataCacheMs=120

# Atomically reconciles EventsPanel missing plugins and existing icon candidates
# under one scratch scope.
patch.intelReconciliation=true
patch.intelEntityIndex=true
intel.entityIndexTtlMs=500
intel.entityIndexOwnerIdleTtlMs=600000
cache.maintenanceIntervalMs=30000

# Cache tuning for patch.mapHitTest. Misses still execute the preserved original hit test.
hover.maxHz=60
hover.cellPixels=3
hover.cellTtlMs=140
hover.ownerIdleTtlMs=300000
hover.cellPruneIntervalMs=30000
hover.maxCells=768

# Caches immutable star-system metadata used when opening a hyperspace/sector map; each map
# still gets newly-created vanilla synthetic terrain/label entities.
patch.systemNebulaCache=true
systemNebula.maxAgeMs=600000

# Avoids repeatedly clearing the hyperspace terrain sample cache when maps are reopened quickly.
patch.sampleCacheClearThrottle=true
hyperspace.sampleCacheClearMinIntervalMs=1500

# Keeps very large custom sectors from drawing an unbounded number of 2000-unit grid lines.
# This intentionally changes only grid density/appearance, not map coordinates or interactions.
patch.gridLineCap=true
grid.maxLinesPerAxis=180
grid.baseSpacing=2000

# CampaignEngine.advance() otherwise rewrites the ObjectRepository listener for hyperspace
# and every star system every frame. The public vanilla readdChangeListeners() API is left
# untouched; only the internal per-frame call is reduced to structural changes + an audit.
patch.campaignListenerThrottle=true
campaign.listenerAuditMs=1000

# Reuses the five defensive collection snapshots in BaseLocation.advance()/advanceEvenIfPaused().
# Only structurally verified iterator-only, non-escaping sites are replaced; scratch storage is
# cleared on every normal and exceptional exit.
patch.campaignSnapshotReuse=true

# Returns immediately before any scratch scope or allocation when an entity has no scripts.
# The uncommon non-empty path keeps the fresh vanilla mutation-safe ArrayList snapshot.
patch.entityScriptSnapshotReuse=true

# Inlines a fast return after restoration/pause handling when both Memory.advance work queues are
# empty. This replaces the older helper-based iterator patch, which telemetry found counterproductive.
# Non-empty expiration/require loops keep their original vanilla iterators and logic.
patch.emptyMemoryAdvanceFastPath=true

# Structurally replaces the terminal CoreScript call to Misc.computeCoreWorldsExtent() with a
# cache that preserves vanilla bounds arithmetic and repairs changed/replaced memory vectors.
# Main/aggressive mode scans once per outer frame and skips intact extra fast-forward substeps.
patch.coreWorldsExtentCache=true
coreWorlds.skipFastForwardIterations=true
coreWorlds.checkMemoryExpiry=true
coreWorlds.validationFrames=1

# Keeps all vanilla route filtering/distance/tie-breaking, but supplies ordered per-system
# candidate lists instead of scanning every hyperspace jump point and every system each frame.
# A miss always falls back to the full vanilla list. TTL bounds staleness for direct mod mutation;
# set TTL to 0 to disable the runtime index while leaving the structural patch installed.
patch.routeJumpPointIndex=true
route.indexTtlMs=250


# Economy.advance otherwise forces ReachEconomy to clear/rebuild its location/market indexes every
# campaign frame. The hook preserves explicit dirty marks from mods and fingerprints ordered market,
# location and id state before omitting only the redundant automatic dirty mark.
patch.economyLocationCache=true

# Unified market scheduler. Economy and planet-condition periodic calls accumulate constant Starsector
# simulation-tick amounts, while delivery cadence is evaluated once per render batch. Thus ×4/×10/×100
# campaign acceleration does not multiply callbacks for batch-managed markets. Current-location,
# interaction and player-owned markets run once per batch; remote/hidden markets use the intervals
# below. The memory key is an explicit compatibility opt-out that preserves one callback per
# simulation tick. Core event and direct mod calls remain synchronous and consume older pending debt.
patch.marketScheduler=true
market.scheduler.batches=4
market.scheduler.hiddenBatches=8
market.scheduler.hot.currentLocation=true
market.scheduler.hot.playerOwned=true
market.scheduler.hot.interaction=true
market.scheduler.policyAuditBatches=300
# Full construction queue/industry scan is performed after a mutation barrier and
# otherwise only once per this many render batches. Save always forces an audit.
market.remote.constructionAuditBatches=180
market.scheduler.perSimulationTickMemoryKey=$starsectorPrepatcher_perSimulationTickMarket

# Maximum number of distinct adjacent float runs retained for one deferred market.
# When the next distinct step would exceed this limit, the existing batch is
# delivered with its exact step history before the new step is recorded.
market.remote.maxPendingRuns=32

# Diagnostic/conservative save mode. false keeps one coalesced Market.advance per
# ordinary pending market while exposing the exact history to patched vanilla
# components. true replays every pending Market.advance step before serialization.
market.remote.exactReplayBeforeSave=false

# Static ASM report for advance(F)V implementations in mod Industry,
# MarketConditionPlugin and SubmarketPlugin classes. This never instruments or
# changes runtime behavior and is disabled by default.
observer.marketAdvanceSemanticRisks=true

# Optional bounded CSV samples explaining why a market entered or remained in
# construction full-rate mode. Aggregate reason/scan counters are always emitted
# in the normal periodic stats line. CSV sampling retains only strings/numbers,
# is capped independently per reason, and never changes scheduler behavior.
observer.marketConstructionDiagnostics=true
observer.marketConstructionDiagnosticsMaxSamplesPerReason=64

# Observation-only level 1 instrumentation for direct MarketAPI.advance(float) calls made by mod
# bytecode. Calls remain synchronous and immediate. Aggregate CSV files and sampled stacks are
# written under logs/direct-market-observe/session-*/ for later scheduler compatibility analysis.
patch.directMarketObservation=true
directMarket.timingSampleEvery=128
directMarket.stackSampleEvery=2048
directMarket.maxStacksPerSite=8
directMarket.reportIntervalSeconds=15
directMarket.maxSites=4096
# Per reporting interval, not process lifetime.
directMarket.unknownStackSamples=32

# Owner-local copy-on-write snapshots avoid per-frame clear/addAll and per-Market global-map
# lookups. Mutators and backing-list replacement invalidate immediately; identity/order edits inside
# the same live list can remain invisible until the bounded audit. Economy state also owns the
# ReachEconomy market/location/id fingerprint used by patch.economyLocationCache.
patch.economyPersistentSnapshots=true
economy.structureAuditMs=5000
market.structureAuditFrames=600

# CommodityOnMarket otherwise tries to remove its private recent-trade availability modifier every
# campaign frame even while quantity is zero and the modifier is already absent. Cache only that
# proven-absent zero state; the first call after construction/load and every nonzero path stay full.
patch.commodityEventModDirtyCache=true

# Replaces Market.advance()'s unconditional five-operation loop over every commodity with an
# ordered active set. Exact vanilla Market/Commodity subclasses and shared/foreign stats fall back.
# MutableStat mutators wake only the owning commodity; direct retained-map edits are recovered by
# the bounded audit. This is aggressive because an unannounced same-size direct map mutation may
# remain invisible until that audit.
patch.commodityTemporalFastPath=true
commodity.temporalAuditFrames=300

# MutableStatWithTempMods normally scans every active temporary modifier every frame. The expiry
# scheduler accumulates elapsed game days in O(1), scans only at the nearest deadline, and flushes
# before add/update, remove, public getMods and writeReplace. hasMod checks membership without forcing a sweep. Public getMods() permanently opts that
# stat instance back into vanilla because the returned live map can be retained and mutated by mods.
patch.tempModExpiryScheduler=true

# Aggressive direct BaseIndustry fast path. A full inherited advance() proves an industry dormant;
# subsequent empty callbacks are skipped until building/disruption state changes or the bounded
# audit expires. Custom advance()/isDisrupted()/getDisruptedKey() implementations stay vanilla.
# Market-condition callbacks are deliberately not classified because the helper costs more than
# an empty virtual call. Direct disruption-memory edits may be observed only at the next audit.
patch.marketNoOpCallbacks=true
market.noOpIndustryAuditFrames=600

# In hyperspace, IntelManager's comm-relay range check otherwise scans all star systems every frame.
# The index returns spatial candidates in the exact original system order; the original loop still
# performs distance, tag, memory and relay-selection checks. Size/endpoint checks are O(1) every
# query; the exact identity/coordinate audit runs at the configured TTL. Any mismatch or uncertainty
# rebuilds or falls back to the full list, so direct system movement can be stale only for that TTL.
patch.commRelaySystemIndex=true
commRelay.indexTtlMs=250

# Reuses six strictly local command/group collections in Ship.advance(). The listener snapshot stays
# freshly allocated because mod listeners may mutate/re-enter the manager during callbacks.
patch.shipAdvanceScratch=true

# Reuses DynamicParticleGroup's deferred-expiry list and replaces LinkedList.removeAll(ArrayList) with
# a stable linear identity removal. Custom equality, small collections and malformed states use vanilla.
patch.particleCleanup=true

# KNOWN DISABLED in 0.7.1: this patch participated in confirmed mission-startup failures.
# Keep false until the loading regression is isolated, fixed and revalidated independently.
patch.loadingTextReader=false

# KNOWN DISABLED in 0.7.1: this patch participated in confirmed mission-startup failures.
# Keep false until the startup logging regression is isolated, fixed and revalidated independently.
patch.startupLogAggregation=false

# Replaces fixed literal regex operations in the high-volume rules loader with
# exact non-regex equivalents. Trailing-empty split semantics are regression-tested.
patch.rulesLiteralParser=true

# Limits only save/load progress-screen redraw requests. Final forced updates remain.
# Set progressHz=0 or disable the patch for vanilla's 60 Hz ceiling.
patch.saveLoadProgressThrottle=true
saveLoad.progressHz=15

# Removes the redundant outer 1 MiB save BufferedOutputStream. The vanilla progress
# stream still installs its own ~1 MiB buffer, and the save format is unchanged.
patch.saveOutputBufferDedup=true

# Corrects the vertical tile range and clamp in BaseTiledTerrain. Matching is structural,
# so compatible translated class files are supported without per-build hash snapshots.
patch.hyperspaceViewportBounds=true

# Removes the no-op TERRAIN_9 pass and reuses seeded Random instances in terrain rendering.
patch.skipNoOpTerrainLayer=true
patch.terrainRandomReuse=true

# Reuses automaton grids only until the public getCells() result escapes to game/mod code.
patch.automatonBufferReuse=true

# Reuses starfield cleanup lists and switches large removal passes to stable linear removal.
patch.starfieldCleanupBuffers=true
patch.starfieldLinearRemoval=true
starfield.removeAllThreshold=8
starfield.pool.maxRetainedCapacity=32768
starfield.pool.oversizedGraceMs=300000

# Delayed high-water trimming for reusable campaign-thread scratch storage.
scratch.trim.enabled=true
scratch.trimGraceMs=300000
scratch.trim.maxListCapacity=32768
scratch.trim.maxIdentityEntries=32768
scratch.trim.maxSetEntries=32768
scratch.trim.maxPooledCollections=32

# Fast-forward presentation coalescing. Full simulation still runs on every substep;
# only structurally verified visual/audio refresh calls run once on the final substep.
patch.fastForwardPresentation=true
patch.fastForwardFrameMarker=true
patch.fastForwardActionIndicators=true
patch.fastForwardLocationVisuals=true
patch.fastForwardFloatingText=true
patch.fastForwardFleetView=true
patch.fastForwardFleetPresentation=true
patch.fastForwardSensorIndicators=true
patch.fastForwardCelestialVisuals=true
patch.fastForwardAuroraAnimation=true
patch.fastForwardContinuousSound=true
patch.fastForwardGateJitter=true

# Aggressive baseline: these groups may change callback, lifetime, particle RNG, or emitter cadence.
patch.fastForwardGlobalAnimations=true
patch.fastForwardSensorFaders=true
patch.fastForwardSlipstreamParticles=true
patch.fastForwardParticleEmitters=true

# realtime passes one ordinary amount on the final substep; simulation multiplies it by
# the number of simulation substeps and can make nonlinear effects visibly jump.
fastForward.visualTime=realtime
fastForward.verbose=true
fastForward.metrics=true


# Periodic counters in logs/prepatcher.log. Set to 0 to disable.
logging.statsIntervalSeconds=30
