# Hyperspace flight optimization layer for Starsector 0.98a-RC8
enabled=true

# Corrects vertical terrain culling for BaseTiledTerrain and therefore all subclasses.
# This intentionally changes mod subclasses too; disable if a terrain mod relied on the bug.
patch.hyperspaceCulling=true
patch.hyperspaceYClamp=true

# Directly removes TERRAIN_9 from HyperspaceTerrainPlugin.getActiveLayers().
# This also skips that layer's preRender/GL-state sequence by design.
patch.skipNoOpTerrainLayer=true

# Reuses seeded java.util.Random instances in terrain tile render paths.
patch.terrainRandomReuse=true

# Reuses a 2-D int buffer only while it has not escaped through getCells().
# Escaped arrays retain vanilla identity and mutation semantics.
patch.automatonBufferReuse=true

# Reuses starfield cleanup lists and replaces large removeAll passes with stable linear removal.
patch.starfieldCleanupBuffers=true
patch.starfieldLinearRemoval=true
removeAll.threshold=8

stats.intervalSeconds=30
